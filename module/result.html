<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result | MBA Club</title>

<link rel="stylesheet" href="../css/dashboard.css">

<style>

.result-container {
  max-width: 900px;
  margin: auto;
  text-align: center;
}

/* ROW LAYOUT */
.row {
  display: flex;
  gap: 20px;
  margin-top: 25px;
}

/* CARD */
.card {
  flex: 1;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* COLORS */
.total { background: #67ade0; }
.attempted { background: #f7f778; }
.accuracy { background: #84e7f2;}
.correct { background: #5fef80; color: rgb(9, 9, 9); }
.incorrect { background: #f76672; color: rgb(14, 14, 14); }
.skipped { background: #e6c864; color: rgb(19, 19, 19); }

/* TEXT */
.card h2 {
  font-size: 32px;
  margin: 0;
}

.card p {
  margin-top: 5px;
  font-weight: 500;
};

/* CIRCLE */
.circle-box {
  position: relative;
  width: 140px;
  height: 140px;
  margin: auto;
}

.circle-box svg {
  transform: rotate(-90deg);
}

.circle-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: bold;
}

/* BUTTONS */
.result-buttons {
  margin-top: 40px;
}

.result-buttons button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.btn-dashboard { background: #2b7cff; color: white; }
.btn-reattempt { background: #28a745; color: white; }
.btn-solution { background: #ff9800; color: white; }

</style>
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 class="brand">MBA Club</h2>
        <ul>
            <li onclick="window.location.href='../dashboard.php'">Dashboard</li>
            <li>My Courses</li>
            <li>Tests</li>
            <li>Profile</li>
            <li onclick="logout()">Logout</li>
        </ul>

	</div>

<div class="main result-container">

  <h1>🎯 Your Result</h1>

  <!-- ROW 1 -->
  <div class="row">
    <div class="card total">
      <h2 id="totalQ">0</h2>
      <p>Total Questions</p>
    </div>

    <div class="card attempted">
      <h2 id="attemptedQ">0</h2>
      <p>Attempted</p>
    </div>
  </div>

  <!-- ROW 2 -->
  <div class="row">
  <div class="card accuracy">
    <h3>Accuracy</h3>

    <div class="circle-box">
      <svg width="140" height="140">

        <!-- background -->
        <circle cx="70" cy="70" r="60"
          stroke="#ddd"
          stroke-width="10"
          fill="none"></circle>

        <!-- progress -->
        <circle id="progressCircle"
          cx="70" cy="70" r="60"
          stroke="#f95b88"
          stroke-width="10"
          fill="none"
          stroke-linecap="round">
        </circle>

      </svg>

      <div class="circle-text" id="accuracyCircle">0%</div>
    </div>

  </div>
</div>


  <!-- ROW 3 -->
  <div class="row">
    <div class="card correct">
      <h2 id="correctQ">0</h2>
      <p>Correct</p>
    </div>

    <div class="card incorrect">
      <h2 id="incorrectQ">0</h2>
      <p>Incorrect</p>
    </div>

    <div class="card skipped">
      <h2 id="skippedQ">0</h2>
      <p>Skipped</p>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="result-buttons">
    <button class="btn-dashboard" onclick="goDashboard()">Dashboard</button>
    <button class="btn-reattempt" onclick="reattempt()">Reattempt</button>
    <button class="btn-solution" onclick="viewSolution()">Answer Key</button>
  </div>

</div>

<script src="../js/result.js"></script>

</body>
</html>
